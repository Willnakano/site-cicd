<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Portfólio DevOps</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; text-align: center; padding: 50px; }
        h1 { color: #232f3e; } /* Cor padrão AWS */
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); display: inline-block; }
        .status { color: #2ec4b6; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🚀 Projeto CI/CD Automatizado</h1>
        <p>Este site foi buildado e deployado automaticamente via <strong>GitHub Actions</strong>.</p>
        <p>Status do Deploy: <span class="status">Sucesso (100% Automatizado)</span></p>
    </div>
</body>
</html>
